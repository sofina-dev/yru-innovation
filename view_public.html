<script>
  Router.add('home', renderGallery);
  Router.add('item', renderDetail);

  function awardBadge(awardStatus) {
    if (!awardStatus) return '';
    return '<span class="badge badge-award position-absolute top-0 end-0 m-2"><i class="bi bi-trophy-fill me-1"></i>' + esc(awardStatus) + '</span>';
  }

  function coverImageHtml(images) {
    var url = images && images.length ? images[0].url : '';
    return url
      ? '<img src="' + esc(url) + '" alt="">'
      : '<div class="card-img-placeholder"><i class="bi bi-image"></i></div>';
  }

  function galleryCardHtml(item) {
    return '<div class="col-md-6 col-lg-4">' +
      '<a href="#/item/' + encodeURIComponent(item.submissionId) + '" class="text-decoration-none text-reset">' +
      '<div class="card card-item position-relative">' +
        '<div class="card-img-wrap">' + coverImageHtml(item.images) + awardBadge(item.awardStatus) + '</div>' +
        '<div class="card-body">' +
          '<span class="badge bg-primary-subtle text-primary mb-2">' + esc(item.categoryLabel || item.category) + '</span>' +
          '<h5 class="card-title">' + esc(item.title) + '</h5>' +
          '<p class="card-text text-muted small">' + esc(excerpt(item.reasonImportance, 120)) + '</p>' +
        '</div>' +
      '</div></a></div>';
  }

  function renderGalleryList(data) {
    var banner = !data.allowPublic
      ? '<div class="alert alert-info">ระบบยังไม่เปิดเผยแพร่ผลงานต่อสาธารณะในขณะนี้</div>'
      : '';
    var grid = data.submissions.length
      ? '<div class="row g-4">' + data.submissions.map(galleryCardHtml).join('') + '</div>'
      : '<p class="text-muted">ยังไม่มีผลงานที่เผยแพร่ในขณะนี้</p>';

    setView(
      '<div class="hero-band mb-4 text-center">' +
        '<p class="eyebrow mb-1">Yala Rajabhat University</p>' +
        '<h1 class="fw-bold">' + esc(data.appName || 'YRU Innovation Portal') + '</h1>' +
        '<p class="mb-0">คลังผลงานนวัตกรรมและเวทีประกวดผลงานของมหาวิทยาลัยราชภัฏยะลา</p>' +
      '</div>' +
      banner + grid
    );
  }

  function renderGallery() {
    if (window.__PUBLIC_DATA__) {
      renderGalleryList(window.__PUBLIC_DATA__);
    } else {
      setLoading();
    }
    api('getGallery').then(function (data) {
      window.__PUBLIC_DATA__ = data;
      if ((location.hash.replace(/^#\/?/, '').split('/')[0] || 'home') === 'home') {
        renderGalleryList(data);
      }
    }).catch(toastError);
  }

  function detailBlockHtml(label, value) {
    var content = richText(value);
    if (!content) return '';
    return '<h6 class="mt-4">' + esc(label) + '</h6>' + content;
  }

  function responsiblePeopleLine(item) {
    var names = (item.responsiblePeople || []).filter(Boolean);
    if (!names.length && !item.organization) return '';
    var parts = [];
    if (names.length) parts.push('ผู้รับผิดชอบ: ' + names.map(esc).join(', '));
    if (item.organization) parts.push('หน่วยงาน: ' + esc(item.organization));
    return '<p class="text-muted small mb-3">' + parts.join(' &middot; ') + '</p>';
  }

  function referenceLinkHtml(link) {
    if (!link) return '';
    var safeHref = /^https?:\/\//i.test(link) ? link : ('https://' + link);
    return '<p class="mt-3"><a class="btn btn-outline-primary btn-sm" target="_blank" rel="noopener noreferrer" href="' + esc(safeHref) + '">' +
      '<i class="bi bi-link-45deg"></i> ลิงก์อ้างอิงเพิ่มเติม</a></p>';
  }

  function galleryImagesHtml(images) {
    if (!images || images.length < 2) return '';
    return '<div class="row g-2 mb-3">' + images.slice(1).map(function (img) {
      return '<div class="col-4 col-md-3"><div class="card-img-wrap" style="aspect-ratio:1/1"><img src="' + esc(img.url) + '" alt=""></div></div>';
    }).join('') + '</div>';
  }

  function renderDetail(id) {
    setLoading();
    api('getDetail', id).then(function (item) {
      var cover = item.images && item.images.length
        ? '<img class="detail-cover" src="' + esc(item.images[0].url) + '" alt="">'
        : '';
      setView(
        '<a href="#/" class="btn btn-link px-0 mb-3"><i class="bi bi-arrow-left"></i> กลับไปคลังผลงาน</a>' +
        '<div class="card card-item"><div class="card-body p-4">' +
          cover +
          (item.awardStatus ? '<span class="badge badge-award mb-3"><i class="bi bi-trophy-fill me-1"></i>' + esc(item.awardStatus) + '</span><br>' : '') +
          '<span class="badge bg-primary-subtle text-primary mb-2">' + esc(item.categoryLabel || item.category) + '</span>' +
          '<h2 class="fw-bold">' + esc(item.title) + '</h2>' +
          responsiblePeopleLine(item) +
          detailBlockHtml('1. เหตุผลความจำเป็น/ความสำคัญของปัญหา', item.reasonImportance) +
          detailBlockHtml('2.1 วัตถุประสงค์และเป้าหมายของการพัฒนานวัตกรรม', item.objectiveGoal) +
          detailBlockHtml('2.2 การใช้หลักการ แนวคิด ทฤษฎี ในการพัฒนานวัตกรรม', item.principleTheory) +
          detailBlockHtml('2.3 กระบวนการพัฒนานวัตกรรม', item.developmentProcess) +
          detailBlockHtml('3. ความสำเร็จของการพัฒนานวัตกรรม', item.successEvidence) +
          detailBlockHtml('4. แนวทางที่จะพัฒนาต่อไปในอนาคต', item.futureDirection) +
          detailBlockHtml('5. การเผยแพร่/การได้รับการยอมรับ/รางวัลที่ได้รับ', item.recognitionAward) +
          detailBlockHtml('6. การจัดเก็บเป็นองค์ความรู้', item.knowledgeCapture) +
          galleryImagesHtml(item.images) +
          referenceLinkHtml(item.referenceLink) +
        '</div></div>'
      );
    }).catch(function (err) {
      setView('<div class="alert alert-danger">' + esc(err.message || err) + '</div>');
    });
  }
</script>
