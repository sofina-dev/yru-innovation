<style>
  :root {
    --yru-primary: #0f4c81;
    --yru-primary-dark: #0a3660;

    --yru-surface: #ffffff;
    --yru-text: #1f2933;

    --bs-primary-rgb: 15, 76, 129;
    --bs-body-font-family: 'Noto Sans Thai', 'Kanit', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--yru-bg);
    color: var(--yru-text);
    font-family: 'Noto Sans Thai', 'Kanit', system-ui, sans-serif;
    min-height: 100vh;
  }

  h1, h2, h3, h4, .brand, .navbar-brand { font-family: 'Kanit', 'Noto Sans Thai', sans-serif; }

  .boot-loader {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
  }

  .navbar-yru {
    background: linear-gradient(120deg, var(--yru-primary) 0%, var(--yru-primary-dark) 100%);
  }
  .navbar-yru .navbar-brand, .navbar-yru .nav-link { color: #fff !important; }
  .navbar-yru .nav-link { opacity: .85; }
  .navbar-yru .nav-link.active, .navbar-yru .nav-link:hover { opacity: 1; }

  .hero-band {
    background: linear-gradient(135deg, var(--yru-primary) 0%, var(--yru-primary-dark) 100%);
    color: #fff;
    border-radius: 0 0 28px 28px;
    padding: 2.5rem 1rem 3rem;
  }
  .hero-band .eyebrow { color: var(--yru-gold); font-weight: 600; letter-spacing: .04em; }

  .card-item {
    border: none;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(15, 76, 129, .08);
    transition: transform .15s ease, box-shadow .15s ease;
    height: 100%;
  }
  .card-item:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(15, 76, 129, .14); }

    background: linear-gradient(120deg, var(--yru-gold), #e6c34a);
    color: #3a2e00;
    font-weight: 600;
  }

    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }

  .skeleton {
    background: linear-gradient(90deg, #eceff3 25%, #f6f8fa 37%, #eceff3 63%);

    border-radius: 10px;
  }

    0% { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
