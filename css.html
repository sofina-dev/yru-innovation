<style>
  :root {
    --yru-primary: #b1567a;
    --yru-primary-dark: #833f5c;
    --yru-gold: #c9a227;
    --yru-bg: #f5f1f2;
    --yru-surface: #ffffff;
    --yru-text: #332b2e;
    --yru-muted: #8a7f84;
    --yru-gray: #6b7280;
    --bs-primary: var(--yru-primary);
    --bs-primary-rgb: 177, 86, 122;
    --bs-body-font-family: 'Noto Sans Thai', 'Kanit', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--yru-bg);
    color: var(--yru-text);
    font-family: 'Noto Sans Thai', 'Kanit', system-ui, sans-serif;
    min-height: 100vh;
  }

  h1, h2, h3, h4, .brand, .navbar-brand { font-family: 'Kanit', 'Noto Sans Thai', sans-serif; }

  .boot-loader {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
  }

  .navbar-yru {
    background: linear-gradient(120deg, var(--yru-primary) 0%, var(--yru-primary-dark) 100%);
  }
  .navbar-yru .navbar-brand, .navbar-yru .nav-link { color: #fff !important; }
  .navbar-yru .nav-link { opacity: .85; }
  .navbar-yru .nav-link.active, .navbar-yru .nav-link:hover { opacity: 1; }

  .hero-band {
    background: linear-gradient(135deg, var(--yru-primary) 0%, var(--yru-gray) 130%);
    color: #fff;
    border-radius: 0 0 28px 28px;
    padding: 2.5rem 1rem 3rem;
  }
  .hero-band .eyebrow { color: #f3d3de; font-weight: 600; letter-spacing: .04em; }

  .card-item {
    border: none;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(177, 86, 122, .12);
    transition: transform .15s ease, box-shadow .15s ease;
    height: 100%;
    overflow: hidden;
  }
  .card-item:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(177, 86, 122, .2); }

  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #e7dde1, #cfc5ca);
    overflow: hidden;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a9969f;
    font-size: 2rem;
  }
  .detail-cover {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    border-radius: 14px;
    margin-bottom: 1.5rem;
  }
  .attachment-preview {
    width: 100%;
    max-width: 320px;
    border-radius: 12px;
    margin-top: .5rem;
    display: none;
    border: 1px solid #e7dde1;
  }

  .badge-award {
    background: linear-gradient(120deg, var(--yru-gold), #e6c34a);
    color: #3a2e00;
    font-weight: 600;
  }

  .toast-host {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }

  .skeleton {
    background: linear-gradient(90deg, #eceff3 25%, #f6f8fa 37%, #eceff3 63%);
    background-size: 400% 100%;
    animation: skeleton-loading 1.4s ease infinite;
    border-radius: 10px;
  }
  @keyframes skeleton-loading {
    0% { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
  }

  .criteria-row label { font-weight: 500; }

  .btn-primary { background-color: var(--yru-primary); border-color: var(--yru-primary); }
  .btn-primary:hover { background-color: var(--yru-primary-dark); border-color: var(--yru-primary-dark); }
  .text-primary { color: var(--yru-primary) !important; }
  .nav-pills .nav-link.active { background-color: var(--yru-primary); }
  .bg-primary-subtle { background-color: #f1dde5 !important; }

  footer.app-footer {
    color: var(--yru-muted);
    text-align: center;
    padding: 2rem 1rem;
    font-size: .9rem;
  }

  /* ---------- rich text (Quill editor + read-only render) ---------- */
  .rich-content, .ql-editor { line-height: 1.7; }
  .rich-content p, .ql-editor p { margin-bottom: .5rem; }
  .rich-content .ql-align-center, .ql-editor .ql-align-center { text-align: center; }
  .rich-content .ql-align-right, .ql-editor .ql-align-right { text-align: right; }
  .rich-content .ql-align-justify, .ql-editor .ql-align-justify { text-align: justify; }
  .rich-content .ql-font-sans, .ql-editor .ql-font-sans { font-family: 'Noto Sans Thai', sans-serif; }
  .rich-content .ql-font-serif, .ql-editor .ql-font-serif { font-family: 'Sarabun', serif; }
  .rich-content .ql-font-thai, .ql-editor .ql-font-thai { font-family: 'Noto Sans Thai', sans-serif; }
  .rich-content .ql-font-kanit, .ql-editor .ql-font-kanit { font-family: 'Kanit', sans-serif; }
  .rich-content .ql-font-prompt, .ql-editor .ql-font-prompt { font-family: 'Prompt', sans-serif; }
  .rich-content .ql-size-small, .ql-editor .ql-size-small { font-size: .82em; }
  .rich-content .ql-size-large, .ql-editor .ql-size-large { font-size: 1.35em; }
  .rich-content .ql-size-huge, .ql-editor .ql-size-huge { font-size: 1.8em; }
  .rich-content a { color: var(--yru-primary); }

  .ql-picker.ql-font .ql-picker-label[data-value="sans"]::before,
  .ql-picker.ql-font .ql-picker-item[data-value="sans"]::before { content: 'Noto Sans Thai'; font-family: 'Noto Sans Thai', sans-serif; }
  .ql-picker.ql-font .ql-picker-label[data-value="serif"]::before,
  .ql-picker.ql-font .ql-picker-item[data-value="serif"]::before { content: 'Sarabun'; font-family: 'Sarabun', serif; }
  .ql-picker.ql-font .ql-picker-label[data-value="thai"]::before,
  .ql-picker.ql-font .ql-picker-item[data-value="thai"]::before { content: 'Thai Sans'; font-family: 'Noto Sans Thai', sans-serif; }
  .ql-picker.ql-font .ql-picker-label[data-value="kanit"]::before,
  .ql-picker.ql-font .ql-picker-item[data-value="kanit"]::before { content: 'Kanit'; font-family: 'Kanit', sans-serif; }
  .ql-picker.ql-font .ql-picker-label[data-value="prompt"]::before,
  .ql-picker.ql-font .ql-picker-item[data-value="prompt"]::before { content: 'Prompt'; font-family: 'Prompt', sans-serif; }
  .ql-picker.ql-size .ql-picker-label[data-value="small"]::before,
  .ql-picker.ql-size .ql-picker-item[data-value="small"]::before { content: 'เล็ก'; }
  .ql-picker.ql-size .ql-picker-label:not([data-value])::before,
  .ql-picker.ql-size .ql-picker-item:not([data-value])::before { content: 'ปกติ'; }
  .ql-picker.ql-size .ql-picker-label[data-value="large"]::before,
  .ql-picker.ql-size .ql-picker-item[data-value="large"]::before { content: 'ใหญ่'; }
  .ql-picker.ql-size .ql-picker-label[data-value="huge"]::before,
  .ql-picker.ql-size .ql-picker-item[data-value="huge"]::before { content: 'ใหญ่มาก'; }

  .rich-editor-wrap .ql-container { min-height: 120px; border-radius: 0 0 10px 10px; font-family: 'Noto Sans Thai', sans-serif; }
  .rich-editor-wrap .ql-toolbar { border-radius: 10px 10px 0 0; background: #fafafa; }

  .image-chip {
    position: relative;
    width: 96px;
    height: 96px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid transparent;
  }
  .image-chip.is-cover { border-color: var(--yru-primary); }
  .image-chip img { width: 100%; height: 100%; object-fit: cover; }
  .image-chip .chip-actions {
    position: absolute; inset: 0; background: rgba(0,0,0,.35);
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 4px; opacity: 0; transition: opacity .15s;
  }
  .image-chip:hover .chip-actions { opacity: 1; }
  .image-chip .chip-actions button { border: none; background: rgba(255,255,255,.9); border-radius: 6px; font-size: .7rem; padding: 2px 5px; }
  .image-chip .cover-badge {
    position: absolute; top: 4px; left: 4px; background: var(--yru-primary); color: #fff;
    font-size: .65rem; padding: 1px 6px; border-radius: 6px;
  }
</style>
